<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sid's Tube</title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>

    <link rel="stylesheet" href="/index.css" />
  </head>

  <body class="bg-white text-black dark:bg-gray-900 dark:text-white">
    <div id="root"></div>

    <button
      id="accessibility-btn"
      class="access-btn"
      aria-label="Abrir opções de acessibilidade"
      aria-haspopup="true"
      aria-controls="accessibility-menu"
    >
      A+
    </button>

    <div
      id="accessibility-menu"
      class="access-menu hidden"
      role="menu"
      aria-label="Menu de acessibilidade"
    >
      <button id="toggle-dark" aria-label="Ativar ou desativar modo escuro">
        Modo escuro
      </button>

      <button
        id="toggle-theme"
        aria-label="Ativar ou desativar barra de rolagem estilizada"
      >
        Scrollbar
      </button>

      <button id="toggle-contrast" aria-label="Ativar ou desativar alto contraste">
        Alto contraste
      </button>

      <button id="increase-font" aria-label="Aumentar o tamanho da fonte">
        A+
      </button>

      <button id="decrease-font" aria-label="Diminuir o tamanho da fonte">
        A-
      </button>
    </div>

    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper></div>
    </div>

    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
      new window.VLibras.Widget("https://vlibras.gov.br/app");
    </script>

    <script type="module" src="/index.tsx"></script>
    <script type="module" src="/accessibility.js"></script>
  </body>
</html>
